<!DOCTYPE html>
<html>

<head>
    <title>Placement Prediction System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        h1 {
            color: #333;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Placement Prediction System</h1>

        <form method="POST">

            <input type="text" name="name" placeholder="Enter Name" required><br>

            <input type="number" step="0.01" name="cgpa" placeholder="Enter CGPA" required><br>

            <input type="number" name="aptitude" placeholder="Enter Aptitude Score" required><br>

            <input type="number" name="communication" placeholder="Enter Communication Score" required><br>

            <input type="number" name="internships" placeholder="Number of Internships" required><br>

            <input type="text" name="skills" placeholder="Enter Skills" required><br>

            <button type="submit">Submit</button>

            <h2 style="white-space: pre-line;">
                {{ result }}
            </h2>

        </form>

    </div>

</body>

</html>
